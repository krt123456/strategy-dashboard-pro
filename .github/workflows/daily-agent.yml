name: Daily Prediction Agent
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  pages: write
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          pip install lightgbm scikit-learn pandas numpy scipy requests beautifulsoup4 pyyaml
          
      - name: Create directories
        run: mkdir -p reports data/raw
      - name: Fetch fresh data
        run: python scripts/fresh_data.py || echo "data fetch partial"
      - name: Run multi-strategy agent
        run: python scripts/multi_strategy_agent.py
      - name: Run daily agent
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python scripts/daily_agent.py || echo "daily agent partial"
      - name: Evolve strategy variants (backtest tournament)
        run: python scripts/strategy_variant_generator.py --top-per-base 2 || echo "variant evolution partial"
      - name: Gather + cache data sources
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python scripts/data_source_registry.py || echo "source cache partial"
      - name: Run variants across all sources (x sport x source matrix)
        run: python scripts/cross_source_strategy_runner.py || echo "cross-source runner partial"
      - name: Resolve results from betexplorer (multi-sport)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          python scripts/resolve_results_betexplorer.py --date "$TODAY" --days-back 2 || echo "betexplorer resolve partial"
          
      - name: Check results (basketball ESPN fallback)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          python scripts/check_results.py --date "$TODAY" || echo "results partial"
          
      - name: Generate report
        run: python scripts/generate_report.py > reports/daily_report_$(date +%Y-%m-%d).md || echo "report partial"
      - name: Backtest strategies (12,942 matches)
        run: python scripts/backtest_strategies.py > reports/backtest_$(date +%Y-%m-%d).txt 2>&1 || echo "backtest partial"
      - name: Strategy evolution report
        run: python scripts/strategy_evolution_report.py || echo "evolution report partial"
      - name: Commit results
        run: |
          git config user.name "Strategy Bot"
          git config user.email "bot@strategy.local"
          git add data/betting_journal.db data/one_xbet_linefeed_snapshot.csv data/basketball_betexplorer_current.csv data/strategy_versions_library.json data/winning_variants.json reports/ 2>/dev/null || true
          git commit -m "📊 Daily agent $(date +%Y-%m-%d)" || echo "nothing to commit"
          git push || echo "push skipped"
          
      - name: Upload journal
        uses: actions/upload-artifact@v4
        with:
          name: betting-journal-$(date +%Y-%m-%d)
          path: data/betting_journal.db data/one_xbet_linefeed_snapshot.csv data/basketball_betexplorer_current.csv
          retention-days: 90
      - name: Build dashboard PWA
        run: python scripts/build_dashboard.py || echo "dashboard build partial"
      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - name: Commit dashboard
        run: |
          git add dashboard/ 2>/dev/null || true
          git commit -m "📱 Dashboard $(date +%Y-%m-%d)" || echo "no dashboard changes"
          git push || echo "push skipped"
          
  deploy-pages:
    needs: run-agent
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
        id: deployment
