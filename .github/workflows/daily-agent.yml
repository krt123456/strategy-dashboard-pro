name: Daily Prediction Agent
on:
  schedule:
    - cron: "15 */2 * * *"   # ربع ساعة بعد دورة VPS (التي تدفع في :00) لتلتقط أحدث بيانات
  workflow_dispatch:
permissions:
  contents: read
# ============================================================
#  العمارة: VPS هو المصدر الوحيد للبيانات/التطوّر/التنبؤات/النتائج
#  (انظر /etc/cron.d/strategy-pred على VPS). هذا الـworkflow مجرد
#  ناشر رفيع: يأخذ أحدث بيانات VPS → يبني dashboard → ينشر للـPages.
#  كاتب واحد = لا تعارض DB ثنائي ولا push-rejection.
# ============================================================
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout (أحدث بيانات VPS)
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build dashboard PWA من قاعدة بيانات VPS
        run: python scripts/build_dashboard.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
